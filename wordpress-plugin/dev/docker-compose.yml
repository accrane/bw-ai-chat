# Throwaway WordPress for plugin development/verification.
#   docker compose up -d
#   ./setup.sh   (installs WP + ACF, activates the plugin, seeds an FAQ page)
services:
  db:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: wordpress
      MARIADB_USER: wp
      MARIADB_PASSWORD: wp
      MARIADB_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    image: wordpress:6.7
    depends_on:
      - db
    ports:
      - '8080:80'
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wp
      WORDPRESS_DB_PASSWORD: wp
    volumes:
      - wp_data:/var/www/html
      - ../bellaworks-chat:/var/www/html/wp-content/plugins/bellaworks-chat
      - ./mu-plugins:/var/www/html/wp-content/mu-plugins
    extra_hosts:
      - host.docker.internal:host-gateway

  cli:
    image: wordpress:cli
    depends_on:
      - wordpress
    user: '33:33'
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wp
      WORDPRESS_DB_PASSWORD: wp
    volumes:
      - wp_data:/var/www/html
      - ../bellaworks-chat:/var/www/html/wp-content/plugins/bellaworks-chat
      - ./mu-plugins:/var/www/html/wp-content/mu-plugins
    extra_hosts:
      - host.docker.internal:host-gateway
    entrypoint: ['tail', '-f', '/dev/null']

volumes:
  db_data:
  wp_data:
